<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 48">
  <style>
    .logo { stroke: #000000; fill: none; }
    .dot { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .logo { stroke: #ffffff; }
      .dot { fill: #ffffff; }
    }
  </style>
  <defs>
    <clipPath id="base"><rect x="0" y="0" width="58" height="46"/></clipPath>
  </defs>
  <g clip-path="url(#base)">
    <polyline class="logo" points="2,48 20,5 38,48" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
    <polyline class="logo" points="20,48 38,5 56,48" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="miter"/>
  </g>
  <circle class="dot" cx="29" cy="5" r="3"/>
</svg>
